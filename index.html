<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャラクターまとめサイト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>キャラクタープロフィール</h1>
  
  <div id="character-container" class="container"></div>

  <script src="characters.js"></script>
  <script>
    const container = document.getElementById('character-container');

    characterData.forEach(char => {
      const card = document.createElement('div');
      card.className = 'char-card';

      const tagsHtml = char.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
      const okHtml = char.statusOk.map(item => `<li>✔ ${item}</li>`).join('');
      const ngHtml = char.statusNg.map(item => `<li>✔ ${item}</li>`).join('');
      const expHtml = char.expressions.map(item => `<li>${item}</li>`).join('');

      let heartsHtml = '';
      for(let i = 0; i < 5; i++) {
        if(i < char.relationship.hearts) {
          heartsHtml += '<span class="heart-icon filled">♥</span>';
        } else {
          heartsHtml += '<span class="heart-icon">♡</span>';
        }
      }

      card.innerHTML = `
        <div class="left-section">
          <div class="speech-bubble">${char.quote}</div>
          <div class="profile-meta">
            <div class="icon-placeholder"></div>
            <div class="profile-text">
              <h2>${char.name}</h2>
              <p>${char.age}</p>
              <p>${char.details}</p>
            </div>
          </div>
          <div class="tags-container">${tagsHtml}</div>
        </div>
        
        <div class="right-section">
          <div class="lists">
            <div><h3>OK</h3><ul>${okHtml}</ul></div>
            <div><h3>NG</h3><ul>${ngHtml}</ul></div>
            <div><h3>よくする表情</h3><ul>${expHtml}</ul></div>
          </div>
          
          <div class="relationship-box">
            <div class="rel-header">
              <span class="rel-icon">🐶</span>
              <span class="rel-title">${char.relationship.title}</span>
            </div>
            
            <div class="rel-content">
              <div class="rel-gradient-block">
                <div class="rel-text-side">${char.relationship.text}</div>
                <div class="rel-image-side" style="background-image: url('${char.relationship.relImage}');">
                  <div class="fade-mask"></div>
                </div>
              </div>
              
              <div class="rel-chat-area">
                <div class="rel-left-user">
                  <div class="rel-mini-icon"></div>
                  <div class="rel-bubble-left">${char.relationship.leftBubble}</div>
                </div>
                
                <div class="rel-center-meta">
                  <div class="rel-hearts">${heartsHtml}</div>
                  <div class="rel-arrow">← ${char.relationship.targetName}</div>
                </div>
                
                <div class="rel-right-user">
                  <div class="rel-bubble-right">${char.relationship.rightBubble}</div>
                  <div class="rel-mini-icon"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
